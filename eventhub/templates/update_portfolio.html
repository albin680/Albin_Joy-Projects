<form method="POST" enctype="multipart/form-data" class="space-y-8 bg-white p-8 md:p-10 rounded-[2.5rem] shadow-xl border border-gray-100">
    {% csrf_token %}
    
    <div class="flex flex-wrap items-center justify-between p-6 bg-slate-900 rounded-3xl mb-4 text-white">
        <div>
            <h4 class="text-xs font-black uppercase tracking-[0.2em] text-indigo-400">Business Status</h4>
            <p class="text-xl font-bold">{{ vendor.category.name }}</p>
        </div>
        <div class="flex items-center space-x-3">
            <span class="text-xs font-bold mr-2">Taking Orders:</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" name="is_available" class="sr-only peer" {% if vendor.is_available %}checked{% endif %}>
                <div class="w-12 h-6 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
            </label>
        </div>
    </div>

    <div class="bg-indigo-50 p-8 rounded-3xl border border-indigo-100">
        <h3 class="text-sm font-black text-indigo-900 uppercase tracking-widest mb-6 flex items-center">
            <i class="fas fa-tags mr-2"></i> Pricing & Rates
        </h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 ml-1">General Base Price (₹)</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-400 font-bold">₹</span>
                    <input type="number" name="base_price" value="{{ vendor.base_price }}" 
                           class="w-full p-4 pl-8 border border-white bg-white rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-gray-700 shadow-sm">
                </div>
                <p class="text-[10px] text-indigo-300 mt-2 ml-1">Overall minimum booking fee.</p>
            </div>

            {% if vendor.category.name|lower == "catering" or vendor.is_caterer %}
            <div>
                <label class="block text-[10px] font-black text-orange-400 uppercase tracking-widest mb-2 ml-1">Price Per Plate / Guest (₹)</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-400 font-bold">₹</span>
                    <input type="number" name="price_per_plate" value="{{ vendor.price_per_plate }}" 
                           class="w-full p-4 pl-8 border border-orange-100 bg-orange-50 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold text-gray-700 shadow-sm">
                </div>
                <p class="text-[10px] text-orange-300 mt-2 ml-1 italic">Specific rate for catering services.</p>
            </div>
            {% endif %}
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Business Name</label>
            <input type="text" name="business_name" value="{{ vendor.business_name }}" 
                   class="w-full p-4 border border-gray-100 bg-gray-50 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none font-bold text-gray-700">
        </div>
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Contact Phone</label>
            <input type="text" name="phone" value="{{ vendor.phone }}" 
                   class="w-full p-4 border border-gray-100 bg-gray-50 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none font-bold text-gray-700">
        </div>
    </div>

    <div class="pt-4">
        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 ml-1">Portfolio & Identity</label>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-200 text-center">
                <i class="fas fa-image text-gray-300 text-xl mb-2"></i>
                <label class="block text-[9px] font-bold text-gray-400 uppercase mb-2">Update Logo</label>
                <input type="file" name="profile_pic" class="text-[10px] w-full">
            </div>
            <div class="p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-200 text-center">
                <i class="fas fa-file-invoice text-gray-300 text-xl mb-2"></i>
                <label class="block text-[9px] font-bold text-gray-400 uppercase mb-2">ID Proof</label>
                <input type="file" name="id_proof" class="text-[10px] w-full">
            </div>
            <div class="p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-200 text-center">
                <i class="fas fa-images text-gray-300 text-xl mb-2"></i>
                <label class="block text-[9px] font-bold text-gray-400 uppercase mb-2">Add Gallery</label>
                <input type="file" name="portfolio_images" multiple class="text-[10px] w-full">
            </div>
        </div>
    </div>

    <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-3xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all duration-300 transform hover:-translate-y-1">
        Update Business Profile
    </button>
</form>
