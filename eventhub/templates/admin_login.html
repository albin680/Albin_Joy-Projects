<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Secure Login | EventHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600/10 rounded-3xl mb-4 border border-indigo-500/20">
                <i class="fas fa-shield-alt text-3xl text-indigo-500"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">EventHub <span class="text-indigo-500">Admin</span></h1>
            <p class="text-slate-400 text-sm mt-2">Authorized Personnel Access Only</p>
        </div>

        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
            {% if messages %}
                {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-bold flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i> {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form action="{% url 'admin_login' %}" method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Administrator Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-4 text-slate-500"></i>
                        <input type="text" name="username" required 
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Access Key (Password)</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-4 text-slate-500"></i>
                        <input type="password" name="password" required 
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-900/50 transition transform active:scale-95">
                    AUTHENTICATE
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-slate-600 text-[10px] uppercase font-bold tracking-widest">
            System IP: {{ request.META.REMOTE_ADDR }}
        </p>
    </div>

</body>
</html>
